version: "3.9"

# ============================================================
# Data Refinery — Medallion Lakehouse
# Services: Spark Master/Worker | MinIO | Project Nessie | Postgres
# ============================================================

networks:
  lakehouse-net:
    driver: bridge

volumes:
  minio-data:
  postgres-data:
  nessie-data:

services:

  # ──────────────────────────────────────────────
  # PostgreSQL — Nessie metadata store
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: lakehouse-postgres
    networks: [lakehouse-net]
    environment:
      POSTGRES_DB: nessie
      POSTGRES_USER: nessie
      POSTGRES_PASSWORD: nessie_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nessie"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Project Nessie — Iceberg REST Catalog
  # ──────────────────────────────────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:0.76.3
    container_name: lakehouse-nessie
    networks: [lakehouse-net]
    ports:
      - "19120:19120"
    environment:
      - nessie.version.store.type=JDBC
      - quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/nessie
      - quarkus.datasource.username=nessie
      - quarkus.datasource.password=nessie_secret
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v1/config"]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # MinIO — S3-compatible Object Store (Iceberg Warehouse)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    networks: [lakehouse-net]
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot MinIO bucket initializer
  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    networks: [lakehouse-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/lakehouse;
        mc mb --ignore-existing local/lakehouse-checkpoints;
        mc anonymous set public local/lakehouse;
        echo 'MinIO buckets ready.';
      "
    restart: "no"

  # ──────────────────────────────────────────────
  # Apache Spark Master
  # ──────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5
    container_name: lakehouse-spark-master
    networks: [lakehouse-net]
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master port
      - "4040:4040"   # Spark App UI
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      # S3A / MinIO config
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
    volumes:
      - ./pipeline:/pipeline
    depends_on:
      minio-init:
        condition: service_completed_successfully
      nessie:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Apache Spark Worker
  # ──────────────────────────────────────────────
  spark-worker:
    image: bitnami/spark:3.5
    container_name: lakehouse-spark-worker
    networks: [lakehouse-net]
    ports:
      - "8081:8081"   # Worker Web UI
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
    volumes:
      - ./pipeline:/pipeline
    depends_on:
      - spark-master
    restart: unless-stopped
